name: Build Patched Companion Release

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: 'Upstream tag (leave empty for latest companion-* tag)'
        required: false
        type: string
        default: ''

jobs:

  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout patches
        uses: actions/checkout@v4
        with:
          path: patches-repo

      - name: Resolve upstream tag
        id: resolve
        env:
          INPUT_TAG: ${{ inputs.upstream_tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG=$(git ls-remote --tags --sort=-v:refname https://github.com/meshcore-dev/MeshCore.git 'refs/tags/companion-*' | grep -v '\^{}' | head -1 | sed 's/.*refs\/tags\///')
            if [ -z "$TAG" ]; then
              echo "::error::No companion-* tags found upstream"
              exit 1
            fi
          fi
          VERSION="${TAG##*-}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved upstream tag: $TAG (version: $VERSION)"

      - name: Clone upstream at tag
        uses: actions/checkout@v4
        with:
          repository: meshcore-dev/MeshCore
          ref: ${{ steps.resolve.outputs.tag }}
          path: firmware

      - name: Apply patches
        working-directory: firmware
        run: |
          git apply ../patches-repo/patches/01-firmware-retry.patch
          echo "Patch applied successfully"

      - name: Setup Build Environment
        uses: ./firmware/.github/actions/setup-build-environment

      - name: Build all companion firmwares
        working-directory: firmware
        env:
          FIRMWARE_VERSION: ${{ steps.resolve.outputs.version }}-patched
        run: /usr/bin/env bash build.sh build-companion-firmwares

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: patched-${{ steps.resolve.outputs.tag }}
          name: "Patched Companion ${{ steps.resolve.outputs.version }}"
          draft: false
          body: |
            Auto-retry patched companion firmware built from upstream [`${{ steps.resolve.outputs.tag }}`](https://github.com/meshcore-dev/MeshCore/releases/tag/${{ steps.resolve.outputs.tag }}).

            **Patches applied:**
            - DM auto-retry (up to 200 attempts, ACK-based cancellation)
            - Group message auto-retry (up to 200 attempts, 10s interval, echo detection)
            - HeardRepeatsService fix (retry nonce instead of timestamp increment)
            - DM retry ACK confirmation for retried deliveries
          files: firmware/out/*
