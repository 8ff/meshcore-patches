name: Build Single Board

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: 'Upstream tag (leave empty for auto-detect based on role)'
        required: false
        type: string
        default: ''
      board:
        description: 'Board to build'
        required: true
        type: choice
        options:
          - Ebyte_EoRa-S3
          - GAT562_30S_Mesh_Kit
          - GAT562_Mesh_Tracker_Pro
          - Heltec_ct62
          - Heltec_E213
          - Heltec_E290
          - Heltec_mesh_solar
          - Heltec_t114
          - Heltec_t114_without_display
          - Heltec_T190
          - heltec_tracker_v2
          - Heltec_v2
          - Heltec_v3
          - heltec_v4
          - heltec_v4_tft
          - Heltec_Wireless_Paper
          - Heltec_Wireless_Tracker
          - Heltec_WSL3
          - ikoka_handheld_nrf_e22_30dbm_096
          - ikoka_handheld_nrf_e22_30dbm_096_rotated
          - ikoka_nano_nrf_22dbm
          - ikoka_nano_nrf_30dbm
          - ikoka_nano_nrf_33dbm
          - ikoka_stick_nrf_22dbm
          - ikoka_stick_nrf_30dbm
          - ikoka_stick_nrf_33dbm
          - KeepteenLT1
          - LilyGo_T-Echo
          - LilyGo_T-Echo-Lite
          - LilyGo_T3S3_sx1262
          - LilyGo_T3S3_sx1276
          - LilyGo_TBeam_1W
          - LilyGo_TDeck
          - LilyGo_TLora_V2_1_1_6
          - LilyGo_Tlora_C6
          - M5Stack_Unit_C6L
          - Mesh_pocket
          - Meshadventurer_sx1262
          - Meshadventurer_sx1268
          - Meshimi
          - Meshtiny
          - Minewsemi_me25ls01
          - Nano_G2_Ultra
          - nibble_screen_connect
          - PicoW
          - ProMicro
          - RAK_11310
          - RAK_3112
          - RAK_3401
          - RAK_3x72
          - RAK_4631
          - RAK_WisMesh_Tag
          - SenseCap_Solar
          - Station_G2
          - T_Beam_S3_Supreme_SX1262
          - Tbeam_SX1262
          - Tbeam_SX1276
          - ThinkNode_M1
          - ThinkNode_M2
          - ThinkNode_M3
          - ThinkNode_M5
          - ThinkNode_M6
          - Tiny_Relay
          - t1000e
          - waveshare_rp2040_lora
          - WHY2025_badge
          - wio-e5
          - wio-e5-mini
          - wio_wm1110
          - WioTrackerL1
          - WioTrackerL1Eink
          - Xiao_C3
          - Xiao_C6
          - Xiao_nrf52
          - Xiao_rp2040
          - Xiao_S3_WIO
      role:
        description: 'Firmware role'
        required: true
        type: choice
        options:
          - companion
          - repeater
        default: companion
      connection_type:
        description: 'Connection type (companion only, ignored for repeater)'
        required: true
        type: choice
        options:
          - ble
          - usb
          - wifi
          - serial
          - all
        default: ble
      patch_firmware_retry:
        description: 'Patch 01: DM/group auto-retry'
        type: boolean
        default: true
      patch_motion_alert:
        description: 'Patch 02: Motion alert (channel broadcast)'
        type: boolean
        default: false
      patch_motion_telemetry:
        description: 'Patch 03: Motion telemetry (presence)'
        type: boolean
        default: false

jobs:

  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout patches
        uses: actions/checkout@v4
        with:
          path: patches-repo

      - name: Resolve upstream tag
        id: resolve
        env:
          INPUT_TAG: ${{ inputs.upstream_tag }}
          ROLE: ${{ inputs.role }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            if [ "$ROLE" == "repeater" ]; then
              PATTERN="refs/tags/repeater-*"
            else
              PATTERN="refs/tags/companion-*"
            fi
            TAG=$(git ls-remote --tags --sort=-v:refname https://github.com/meshcore-dev/MeshCore.git "$PATTERN" | grep -v '\^{}' | head -1 | sed 's/.*refs\/tags\///')
            if [ -z "$TAG" ]; then
              echo "::error::No matching tags found upstream"
              exit 1
            fi
          fi
          VERSION="${TAG##*-}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved upstream tag: $TAG (version: $VERSION)"

      - name: Clone upstream at tag
        uses: actions/checkout@v4
        with:
          repository: meshcore-dev/MeshCore
          ref: ${{ steps.resolve.outputs.tag }}
          path: firmware

      - name: Apply patches
        working-directory: firmware
        env:
          PATCH_01: ${{ inputs.patch_firmware_retry }}
          PATCH_02: ${{ inputs.patch_motion_alert }}
          PATCH_03: ${{ inputs.patch_motion_telemetry }}
        run: |
          APPLIED=""
          if [ "$PATCH_01" == "true" ]; then
            git apply ../patches-repo/patches/01-firmware-retry.patch
            APPLIED="${APPLIED}01-firmware-retry "
          fi
          if [ "$PATCH_02" == "true" ]; then
            git apply ../patches-repo/patches/02-motion-alert.patch
            APPLIED="${APPLIED}02-motion-alert "
          fi
          if [ "$PATCH_03" == "true" ]; then
            git apply ../patches-repo/patches/03-motion-telemetry.patch
            APPLIED="${APPLIED}03-motion-telemetry "
          fi
          if [ -z "$APPLIED" ]; then
            echo "::warning::No patches selected"
          else
            echo "Applied: $APPLIED"
          fi

      - name: Set patch build flags
        env:
          PATCH_02: ${{ inputs.patch_motion_alert }}
          PATCH_03: ${{ inputs.patch_motion_telemetry }}
        run: |
          FLAGS=""
          if [ "$PATCH_02" == "true" ]; then
            FLAGS="$FLAGS -DMOTION_ALERT_ENABLED"
          fi
          if [ "$PATCH_03" == "true" ]; then
            FLAGS="$FLAGS -DMOTION_TELEMETRY_ENABLED"
          fi
          if [ -n "$FLAGS" ]; then
            echo "PLATFORMIO_BUILD_FLAGS=$FLAGS" >> "$GITHUB_ENV"
            echo "Patch build flags: $FLAGS"
          fi

      - name: Setup Build Environment
        uses: ./firmware/.github/actions/setup-build-environment

      - name: Build firmware
        working-directory: firmware
        env:
          FIRMWARE_VERSION: ${{ steps.resolve.outputs.version }}-patched
          BUILD_BOARD: ${{ inputs.board }}
          BUILD_CONNECTION: ${{ inputs.connection_type }}
          BUILD_ROLE: ${{ inputs.role }}
        run: |
          if [ "$BUILD_ROLE" == "repeater" ]; then
            /usr/bin/env bash build.sh build-matching-firmwares "${BUILD_BOARD}_repeater"
          elif [ "$BUILD_CONNECTION" == "all" ]; then
            /usr/bin/env bash build.sh build-matching-firmwares "${BUILD_BOARD}_companion"
          else
            /usr/bin/env bash build.sh build-matching-firmwares "${BUILD_BOARD}_companion_radio_${BUILD_CONNECTION}"
          fi

      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.role }}-${{ inputs.board }}
          path: firmware/out
